name: Intelligent Test Selection

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  select-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic dataset and train model
        run: |
          python ml/generate_synthetic_history.py
          python ml/train_selector.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          npm ci || npm install
          npx playwright install --with-deps

      - name: Get changed files
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          else
            FILES=$(git diff --name-only HEAD~1 HEAD | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Select impacted tests
        id: selector
        run: |
          CHANGED="${{ steps.changes.outputs.files }}"
          if [ -z "$CHANGED" ]; then
            echo "SELECTED_TESTS=" >> "$GITHUB_ENV"
          else
            OUTPUT=$(python ci/select_tests.py --changed-files $CHANGED)
            echo "$OUTPUT"
            SELECTED=$(echo "$OUTPUT" | grep '^SELECTED_TESTS=' | cut -d'=' -f2-)
            echo "SELECTED_TESTS=$SELECTED" >> "$GITHUB_ENV"
          fi

      - name: Run selected Playwright tests
        run: npm run test:selected
        env:
          SELECTED_TESTS: ${{ env.SELECTED_TESTS }}
